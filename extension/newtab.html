<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <main>
    <div class="left-col">
      <button id="review-btn" class="review-btn" type="button" hidden>📅 Week in review</button>
      <button id="reflect-btn" class="review-btn reflect-btn" type="button" hidden>🧠 Reflect on the week</button>
      <section id="motd" class="motd" hidden>
        <button id="motd-phrase" class="motd-phrase" type="button"></button>
        <div id="motd-detail" class="motd-detail" hidden>
          <p id="motd-context" class="motd-context"></p>
          <p id="motd-why" class="motd-why"></p>
          <a id="motd-source" class="motd-source" target="_blank" rel="noopener"></a>
        </div>
      </section>
      <div id="root">
        <div class="card loading"><h1>Loading…</h1></div>
      </div>
      <section id="recall" class="recall-panel" hidden>
        <span class="recall-label">💡 Remember this?</span>
        <p id="recall-text" class="recall-text"></p>
        <span id="recall-when" class="recall-when"></span>
      </section>
      <section id="learnings" class="learnings-panel" hidden>
        <form id="learning-form" class="learning-form">
          <textarea id="learning-input" name="text" rows="1"
                    placeholder="What did you learn today?" autocomplete="off"></textarea>
        </form>
        <ul id="learning-list" class="learning-list"></ul>
      </section>
    </div>
    <section id="tasks" class="tasks-panel" hidden>
      <div class="tasks-header">
        <h2>Tasks</h2>
        <button id="add-toggle" class="add-toggle">+ Add</button>
      </div>
      <form id="add-form" class="add-form" hidden>
        <div id="form-mode" class="form-mode" hidden>Editing task</div>
        <input type="text" name="title" placeholder="What needs doing? (#tag to label)" required autocomplete="off">
        <div id="parse-hint" class="parse-hint" hidden></div>
        <div class="date-row">
          <label class="dt-label">Due
            <span class="dt-field">
              <input type="date" name="due_at_date">
              <input type="time" name="due_at_time" class="dt-time" hidden>
              <button type="button" class="dt-time-toggle">+ time</button>
            </span>
          </label>
          <label class="dt-label">For
            <span class="dt-field">
              <input type="date" name="scheduled_at_date">
              <input type="time" name="scheduled_at_time" class="dt-time" hidden>
              <button type="button" class="dt-time-toggle">+ time</button>
            </span>
          </label>
        </div>
        <textarea name="notes" placeholder="Notes (optional)" rows="2"></textarea>
        <div class="form-actions">
          <label class="lt-check"><input type="checkbox" name="long_term"> Long term</label>
          <button type="button" id="add-cancel" class="ghost">Cancel</button>
          <button type="submit" id="add-submit" class="primary">Add task</button>
        </div>
      </form>
      <div id="tag-filter" class="tag-filter" hidden></div>
      <ul id="pending-list" class="task-list"></ul>
      <p id="empty-msg" class="empty hidden">No pending tasks.</p>
      <div id="longterm-section" class="longterm-section" hidden>
        <h3 class="section-label">Long term</h3>
        <ul id="longterm-list" class="task-list"></ul>
      </div>
      <div id="completed-section" class="completed-section" hidden>
        <button id="completed-toggle" class="ghost completed-toggle"></button>
        <ul id="completed-list" class="task-list completed" hidden></ul>
      </div>
    </section>
  </main>
  <div id="review-modal" class="review-modal" hidden>
    <div class="review-backdrop"></div>
    <div class="review-dialog" role="dialog" aria-modal="true" aria-labelledby="review-title">
      <button id="review-close" class="review-close" type="button" aria-label="Close">✕</button>
      <div id="review-content" class="review-content"></div>
    </div>
  </div>
  <script src="newtab.js"></script>
</body>
</html>
